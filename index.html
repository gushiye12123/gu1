<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>数独大师</title>
<style>
:root {
--bg-deep: #0f0c29;--bg-mid:#302b63;--bg-light:#24243e;
--card:#fff;--primary:#6c5ce7;--primary-dark:#4a3fc2;
--pink:#fd79a8;--green:#00b894;--yellow:#fdcb6e;
--p1:#4285f4;--p2:#ea4335;
}
*{margin:0;padding:0;box-sizing:border-box;font-family:Microsoft Yahei}
body{background:linear-gradient(135deg,var(--bg-deep),var(--bg-mid),var(--bg-light));min-height:100vh;padding:20px;display:flex;flex-direction:column;align-items:center}
.menu-box{position:fixed;inset:0;background:rgba(0,0,0,.85);display:flex;align-items:center;justify-content:center;z-index:99}
.menu-card{background:#fff;padding:40px 30px;border-radius:16px;width:420px;text-align:center}
.menu-card h2{color:var(--primary-dark);margin-bottom:30px;font-size:28px}
.menu-btn{width:80%;padding:13px;margin:9px auto;border:none;border-radius:10px;background:var(--primary);color:#fff;font-size:16px;cursor:pointer;transition:.2s}
.menu-btn:hover{background:var(--primary-dark);transform:scale(1.03)}
.hide{display:none !important}
.top-bar{display:flex;gap:12px;margin-bottom:15px;flex-wrap:wrap;justify-content:center}
.time-btn,.diff-btn{padding:8px 14px;border:none;border-radius:22px;cursor:pointer;font-size:14px}
.time-btn.active{background:var(--primary);color:#fff}
.diff-btn.active{background:var(--yellow)}
.game-box{background:var(--card);padding:25px;border-radius:18px}
.player-tip{text-align:center;margin-bottom:10px;font-size:17px}
table{border-collapse:collapse;margin:0 auto}
td{width:46px;height:46px;border:1px #bbb solid;text-align:center;font-size:20px;cursor:pointer;background:#fff}
td:nth-child(3n){border-right:2px #333 solid}
tr:nth-child(3n) td:nth-child(3n){border-right:2px #333 solid}
tr:nth-child(3n) td{border-bottom:2px #333 solid}
td.fixed{background:#e9e9e9;cursor:not-allowed}
td.select-p1{background:var(--p1);color:#fff}
td.select-p2{background:var(--p2);color:#fff}
td.wrong{background:#ffdddd;color:red}
.ctrl-wrap{display:flex;gap:30px;margin-top:20px;justify-content:center}
.player-panel{width:200px}
.num-bar{display:flex;gap:6px;flex-wrap:center;justify-content:center;margin:8px 0}
.num-btn{width:36px;height:36px;border-radius:50%;border:1px #999 solid;font-size:16px;cursor:pointer}
.opt-bar{display:flex;gap:6px;justify-content:center;flex-wrap:wrap}
.opt-btn{padding:7px 10px;border:none;border-radius:8px;color:#fff;font-size:13px;cursor:pointer;margin:3px}
.undo{background:#777}.tip{background:var(--yellow);color:#222}.del{background:var(--pink)}.check{background:var(--green)}.reset{background:#555;margin-top:6px}
.set-wrap{position:fixed;inset:0;background:rgba(0,0,0,.7);display:flex;align-items:center;justify-content:center;z-index:98}
.set-card{background:#fff;padding:26px;border-radius:14px;width:340px}
.level-info{color:#fff;font-size:17px;margin-bottom:8px}
</style>
</head>
<body>
<div class="menu-box" id="mainMenu">
<div class="menu-card">
<h2>数独大师</h2>
<div style="margin-bottom:12px;color:#777" id="saveLevel">已通关：第1关</div>
<button class="menu-btn" onclick="startGame('single')">单人闯关</button>
<button class="menu-btn" onclick="startGame('ai')">AI对战</button>
<button class="menu-btn" onclick="startGame('multi')">本地双人</button>
<button class="menu-btn" onclick="openSet()">音乐设置</button>
<button class="menu-btn" onclick="alert('简易32空/普通45空/困难55空；闯关自动存档')">游戏说明</button>
</div>
</div>

<div class="set-wrap hide" id="setBox">
<div class="set-card">
<h3>背景音乐设置</h3>
<p>音量：<input type="range" min="0" max="1" step="0.1" id="volCtrl" value="0.5"></p>
<button onclick="bgMusic.paused?bgMusic.play():bgMusic.pause()" class="opt-btn check">开关BGM</button>
<button onclick="closeSet()" class="opt-btn del">关闭</button>
</div>
</div>

<div class="game-wrap hide" id="gameWrap">
<div class="level-info" id="levelShow">当前关卡：1</div>
<div class="top-bar">
<button class="time-btn active" data-t="0">不限时</button>
<button class="time-btn" data-t="1200">20分钟</button>
<button class="time-btn" data-t="1800">30分钟</button>
</div>
<div class="top-bar">
<button class="diff-btn active" data-d="easy">简易</button>
<button class="diff-btn" data-d="normal">普通</button>
<button class="diff-btn" data-d="hard">困难</button>
</div>
<div class="game-box">
<div class="player-tip" id="playerTip">玩家1回合</div>
<table id="boardTab"></table>

<div class="ctrl-wrap">
<!--玩家1控制面板-->
<div class="player-panel">
<div style="color:#4285f4
